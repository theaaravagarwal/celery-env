name: Feature request
description: Suggest an API, compiler, CLI, docs, or benchmark improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should celery-env do?
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Any performance, size, security, or compatibility concerns?
